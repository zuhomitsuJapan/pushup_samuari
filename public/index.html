<!DOCTYPE html>
<html>
<head>
  <title>Pushup Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>

<body style="font-family:Arial;background:#111;color:white;text-align:center">

<h1>🔥 Pushup Tracker</h1>

<div id="login">
  <input id="username" placeholder="Name"><br><br>
  <input id="team" placeholder="Team Code"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
  <h2 id="welcome"></h2>

  <input id="pushups" type="number" placeholder="Pushups"><br><br>
  <button onclick="addPushups()">Speichern</button>

  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<script>

let user = null;

async function login() {
  const username = document.getElementById("username").value;
  const team = document.getElementById("team").value;

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, team })
  });

  user = await res.json();

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Hi " + user.username;

  loadLeaderboard();
}

async function addPushups() {
  const amount = document.getElementById("pushups").value;

  await fetch('/api/pushups', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ amount })
  });

  loadLeaderboard();
}

async function loadLeaderboard() {
  const res = await fetch('/api/leaderboard');
  const data = await res.json();

  let html = "";

  data.forEach((u,i)=>{
    html += `<p>${i+1}. ${u.username} - ${u.total}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

</script>

</body>
</html>
