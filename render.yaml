services:
  - type: web
    name: pushup-online-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: pushup-postgres
          property: connectionString

databases:
  - name: pushup-postgres
    plan: free
